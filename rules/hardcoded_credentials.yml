rules:
  - id: python-hardcoded-password
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded Password: A password or secret is assigned directly as a string literal.
      Secrets should never appear in source code — use environment variables instead.
    pattern-either:
      - pattern: password = "..."
      - pattern: passwd = "..."
      - pattern: PASSWORD = "..."
      - pattern: secret = "..."
      - pattern: SECRET = "..."
      - pattern: SECRET_KEY = "..."
    fix: >
      Use environment variables:
        import os
        password = os.environ["DB_PASSWORD"]
    metadata:
      cwe: CWE-798
      owasp: "A07:2021 – Identification and Authentication Failures"
      category: "Hardcoded Credentials"
      confidence: MEDIUM
      title: "Hardcoded Password"

  - id: python-hardcoded-api-key
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded API Key: An API key or token is embedded as a string literal.
      These values will be exposed in version control and to anyone who reads the code.
    pattern-regex: '(api_key|apikey|api_secret|access_token|auth_token)\s*=\s*["\'][a-zA-Z0-9_\-]{16,}["\']'
    fix: >
      Store secrets in environment variables and load with os.environ or a secrets manager.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021 – Identification and Authentication Failures"
      category: "Hardcoded Credentials"
      confidence: MEDIUM
      title: "Hardcoded API Key"

  - id: python-hardcoded-github-token
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded GitHub Token detected (ghp_ prefix). Rotate this token immediately.
    pattern-regex: 'ghp_[A-Za-z0-9]{36}'
    fix: Rotate the token, remove it from code, and load from environment variables.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021 – Identification and Authentication Failures"
      category: "Hardcoded Credentials"
      confidence: HIGH
      title: "Hardcoded GitHub Token"

  - id: python-hardcoded-openai-key
    languages: [python]
    severity: ERROR
    message: Hardcoded OpenAI API key detected (sk- prefix). Rotate immediately.
    pattern-regex: 'sk-[A-Za-z0-9]{48}'
    fix: Remove from code and load from environment variables.
    metadata:
      cwe: CWE-798
      owasp: "A07:2021 – Identification and Authentication Failures"
      category: "Hardcoded Credentials"
      confidence: HIGH
      title: "Hardcoded OpenAI API Key"
