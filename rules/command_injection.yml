rules:
  - id: python-command-injection-os-system
    languages: [python]
    severity: ERROR
    message: >
      Command Injection via os.system(): User-controlled input is passed to
      os.system(), which executes arbitrary shell commands.
    pattern-either:
      - pattern: os.system($USER_INPUT)
      - pattern: os.system(... + $USER_INPUT + ...)
      - pattern: os.system(f"... {$VAR} ...")
    fix: >
      Use subprocess.run() with a list of arguments (no shell=True):
        subprocess.run(["ls", directory], check=True)
    metadata:
      cwe: CWE-78
      owasp: "A03:2021 – Injection"
      category: "Command Injection"
      confidence: HIGH
      title: "Command Injection via os.system()"

  - id: python-command-injection-subprocess-shell
    languages: [python]
    severity: ERROR
    message: >
      Command Injection via subprocess with shell=True: Passing user input to
      subprocess with shell=True allows arbitrary command execution.
    pattern-either:
      - pattern: subprocess.run($CMD, ..., shell=True, ...)
      - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
      - pattern: subprocess.call($CMD, ..., shell=True, ...)
      - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
    fix: >
      Pass a list of arguments instead of a shell string:
        subprocess.run(["git", "clone", repo_url], check=True)
    metadata:
      cwe: CWE-78
      owasp: "A03:2021 – Injection"
      category: "Command Injection"
      confidence: HIGH
      title: "Command Injection via subprocess shell=True"

  - id: python-eval-injection
    languages: [python]
    severity: ERROR
    message: >
      Code Injection via eval(): eval() executes arbitrary Python code.
      Never pass user-controlled input to eval().
    pattern-either:
      - pattern: eval($USER_INPUT)
      - pattern: eval(request.GET.get(...))
      - pattern: eval(request.POST.get(...))
      - pattern: exec($USER_INPUT)
    fix: >
      Use ast.literal_eval() for safe evaluation of Python literals:
        import ast; ast.literal_eval(user_input)
    metadata:
      cwe: CWE-78
      owasp: "A03:2021 – Injection"
      category: "Command Injection"
      confidence: HIGH
      title: "Code Injection via eval() or exec()"
